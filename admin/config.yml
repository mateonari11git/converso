backend:
  name: git-gateway
  branch: main

media_folder: "imagenes"
public_folder: "/imagenes"

collections:
  - name: "articulos"
    label: "Artículos del carrusel/categorías"
    files:
      - file: "articulos.json"
        label: "Lista de artículos"
        name: "articulos"
        fields:
          - label: "Artículos"
            name: "items"
            widget: "list"
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Imagen", name: "imagen", widget: "image" }
              - { label: "Link", name: "link", widget: "string" }
              - { label: "Destacada", name: "destacada", widget: "boolean", default: false }
              - { label: "Categoría", name: "categoria", widget: "select", options: ["ediciones-completas", "versiones", "vistazos", "variedades", "vulgaridades"] }

  - name: "eventos"
    label: "Eventos"
    files:
      - file: "eventos.json"
        label: "Lista de eventos"
        name: "eventos"
        fields:
          - label: "Eventos"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Fecha", name: "fecha", widget: "string" }
              - { label: "Hora", name: "hora", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
  - name: "notas"
    label: "Notas del día"
    files:
      - file: "notas.json"
        label: "Feed de notas"
        name: "notas"
        fields:
          - label: "Notas"
            name: "items"
            widget: "list"
            fields:
              - { label: "Usuario", name: "usuario", widget: "string" }
              - { label: "Fecha", name: "fecha", widget: "string" }
              - { label: "Hora", name: "hora", widget: "string" }
              - { label: "Tipo", name: "tipo", widget: "select", options: ["texto", "link", "imagen"] }
              - { label: "Contenido", name: "contenido", widget: "text" }
              - { label: "URL", name: "url", widget: "string", required: false }