backend:
  name: github
  repo: mateonari11git/converso
  branch: main
  base_url: https://decap-converso.mateonari11.workers.dev
  auth_endpoint: auth

site_domain: elconversador.com.co
display_url: https://elconversador.com.co

media_folder: "imagenes"
public_folder: "/imagenes"

collections:
  - name: "contenidos"
    label: "Contenidos"
    files:
      - file: "contenidos.json"
        label: "Lista de contenidos"
        name: "contenidos"
        fields:
          - label: "Contenidos"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "string" }

              - label: "Tipo"
                name: "tipo"
                widget: "select"
                options: ["articulo", "edicion"]

              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }
              - { label: "Subtítulo", name: "subtitulo", widget: "string", required: false }
              - { label: "Autor", name: "autor", widget: "string", required: false }
              - { label: "Fecha", name: "fecha", widget: "string", required: false }
              - { label: "Imagen principal / portada", name: "imagen", widget: "image" }

              - label: "Categoría"
                name: "categoria"
                widget: "select"
                options: ["ediciones-completas", "versiones", "vistazos", "variedades", "vulgaridades"]

              - { label: "Destacada", name: "destacada", widget: "boolean", default: false }

              - label: "Contenido del artículo"
                name: "contenido"
                widget: "list"
                required: false
                types:
                  - label: "Texto"
                    name: "texto"
                    widget: "object"
                    fields:
                      - { label: "Contenido", name: "contenido", widget: "text" }

                  - label: "Imagen"
                    name: "imagen"
                    widget: "object"
                    fields:
                      - { label: "Imagen", name: "url", widget: "image" }
                      - { label: "Pie de foto", name: "alt", widget: "string", required: false }

              - label: "Páginas de edición completa"
                name: "paginas"
                widget: "list"
                required: false
                field:
                  label: "Página"
                  name: "pagina"
                  widget: "image"

  - name: "eventos"
    label: "Eventos"
    files:
      - file: "eventos.json"
        label: "Lista de eventos"
        name: "eventos"
        fields:
          - label: "Eventos"
            name: "items"
            widget: "list"
            fields:
              - { label: "ID", name: "id", widget: "number" }
              - { label: "Fecha", name: "fecha", widget: "string" }
              - { label: "Hora", name: "hora", widget: "string" }
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Descripción", name: "descripcion", widget: "text" }

  - name: "notas"
    label: "Notas del día"
    files:
      - file: "notas.json"
        label: "Feed de notas"
        name: "notas"
        fields:
          - label: "Notas"
            name: "items"
            widget: "list"
            fields:
              - { label: "Usuario", name: "usuario", widget: "string" }
              - { label: "Fecha", name: "fecha", widget: "string" }
              - { label: "Hora", name: "hora", widget: "string" }
              - { label: "Tipo", name: "tipo", widget: "select", options: ["texto", "link", "imagen"] }
              - { label: "Contenido", name: "contenido", widget: "text" }
              - { label: "URL", name: "url", widget: "string", required: false }